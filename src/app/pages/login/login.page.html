<ion-header>
  <ion-toolbar>
    <ion-title>Connexion</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content ion-padding">
  <ion-card class="auth-card">
    <ion-card-content>
      <h2>Bienvenue</h2>
      <p>Connectez-vous pour accéder à votre application.</p>

      <ion-item class="custom-item">
        <ion-input
          placeholder="Email"
          type="email"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-input
          placeholder="Mot de passe"
          type="password"
          [(ngModel)]="password">
        </ion-input>
      </ion-item>

      <ion-button expand="block" class="primary-btn ion-margin-top" (click)="login()">
        Se connecter
      </ion-button>

      <ion-text color="danger" *ngIf="message">
        <p class="error-text">{{ message }}</p>
      </ion-text>

      <ion-button expand="block" fill="clear" class="link-btn" (click)="goToRegister()">
        Créer un compte
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
