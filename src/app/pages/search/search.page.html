<ion-header>
  <ion-toolbar>
    <ion-title>Recherche</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="search-content ion-padding">
  <ion-item class="search-item">
    <ion-input
      placeholder="Rechercher un événement"
      [(ngModel)]="keyword">
    </ion-input>
  </ion-item>

  <ion-button expand="block" class="search-btn ion-margin-top" (click)="searchEvents()">
    Rechercher
  </ion-button>

  <ion-card *ngFor="let event of filteredEvents" class="search-card">
    <ion-card-header>
      <ion-card-title>{{ event.name }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      Date : {{ event.date }} <br />
      Catégorie : {{ event.category }}
    </ion-card-content>
  </ion-card>
</ion-content>

<app-bottom-nav active="search"></app-bottom-nav>
